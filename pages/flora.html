<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flora Explorer | CUK BioAtlas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/cards.css">
    <link rel="stylesheet" href="../css/explorer.css">

</head>

<body>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Hero -->
    <section class="explorer-hero">

        <div class="container">

            <h1>🌿 Flora Explorer</h1>

            <p>
                Explore all plant species recorded inside
                Central University of Karnataka Campus.
            </p>

        </div>

    </section>

    <!-- Statistics -->
    <section class="container mt-5">

        <div class="row text-center g-4">

            <div class="col-md-4">

                <div class="stat-card">

                    <h3 id="totalSpecies">0</h3>

                    <p>Total Plant Species</p>

                </div>

            </div>

            <div class="col-md-4">

                <div class="stat-card">

                    <h3 id="totalObservations">0</h3>

                    <p>Observations</p>

                </div>

            </div>

            <div class="col-md-4">

                <div class="stat-card">

                    <h3 id="contributors">0</h3>

                    <p>Contributors</p>

                </div>

            </div>

        </div>

    </section>

    <!-- Search -->
    <section class="container my-5">

        <input
            id="searchInput"
            class="form-control"
            type="text"
            placeholder="Search Plant...">

    </section>

    <!-- Species Cards -->
    <section class="container">

        <div
            id="speciesContainer"
            class="row g-4">

        </div>

    </section>

    <!-- Pagination -->
    <section class="container my-5">

        <nav aria-label="Plant pagination">

            <ul
                id="pagination"
                class="pagination justify-content-center">

            </ul>

        </nav>

    </section>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="../js/navbar.js"></script>
    <script src="../js/footer.js"></script>
    <script src="../js/flora.js"></script>

</body>

</html>
